index:
  title: Finish proving your identity by signing in to your online banking
  content-a:
    - <p class="govuk-body">Your account must be:</p>
    - <ul class="govuk-list govuk-list--bullet">
    - <li>a current account, not a savings account, credit card account or other type of account</li>
    - <li>in your name (you can use a joint account)</li>
    - <li>more than 3 months old</li>
    - </ul>
  details:
    summary: How does online banking prove my identity?
    content: Banks have very strong security, so when you sign in, they know it’s really you.<br><br> The bank can then confirm the details you gave us, to help us be sure you are who you say you are.
  content-b:
    - <h2 class="govuk-heading-m">Before you sign in</h2>
    - <p class="govuk-body">We’ll ask for your approval to share information from your account with a company called Ecospend.</p>
    - <p class="govuk-body">This is so we can securely connect with your bank and confirm your identity. You’ll see what information will be shared with Ecospend before you agree to it.</p>
    - <p class="govuk-body"><a class="govuk-link govuk-link--no-visited-state" target="_blank" href="https://www.gov.uk/government/publications/govuk-one-login-privacy-notice">Our privacy notice (opens in new tab)</a> has more detail about how your information will be used.</p>
    - <p class="govuk-body">Ecospend is regulated by the <a class="govuk-link govuk-link--no-visited-state" target="_blank" href="https://register.fca.org.uk/s/firm?id=0010X00004KSo9HQAT">Financial Conduct Authority (opens in a new tab)</a>.</p>
  primaryButton: Continue
  secondaryLink: Prove your identity another way
