name: PR check

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

jobs:
  resolve-test-versions:
    runs-on: ubuntu-latest
    outputs:
      playwright-version: ${{ steps['resolve-playwright-version'].outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve Playwright version
        id: resolve-playwright-version
        run: |
          version="$(yq -r '.devDependencies["@playwright/test"] // .dependencies["@playwright/test"] // ""' package.json)"
          test -n "$version" || { echo "No @playwright/test version found in package.json"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pre-commit checks
        uses: govuk-one-login/github-actions/code-quality/run-pre-commit@3b0015c58dd0e19e1572fda59dda4184df387d1e
        with:
          package-manager: 'npm'
          install-dependencies: 'true'
          all-files: 'true'

  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node
        uses: govuk-one-login/github-actions/node/install-dependencies@4c76410195b5fcb1804fc7c183ed20704252830f
        with:
          node-version-file: '.nvmrc'
      - name: Type check
        run: npm run type-check
      - name: i18n check
        run: npm run check-translation
      - name: SAM lint
        run: sam validate --region eu-west-2 -t deploy/template.yml --lint

  infra-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node
        uses: govuk-one-login/github-actions/node/install-dependencies@4c76410195b5fcb1804fc7c183ed20704252830f
        with:
          node-version-file: '.nvmrc'
      - name: Infra tests
        run: npm run test:infra

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: static-checks
    steps:
      - name: Setup Node
        uses: govuk-one-login/github-actions/node/install-dependencies@4c76410195b5fcb1804fc7c183ed20704252830f
        with:
          node-version-file: '.nvmrc'
      - name: Unit tests
        run: npm run test
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  browser-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - resolve-test-versions
      - static-checks
    steps:
      - name: Setup Node
        uses: govuk-one-login/github-actions/node/install-dependencies@4c76410195b5fcb1804fc7c183ed20704252830f
        with:
          node-version-file: '.nvmrc'
      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ needs['resolve-test-versions'].outputs.playwright-version }}
      - name: Setup Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Build
        run: npm run build
      - name: Browser tests
        run: npm run test:browser
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3

  sonar-scan:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - name: Run SonarCloud scan
        uses: govuk-one-login/github-actions/code-quality/sonarcloud@9d6ee027d0b9167dfc25e67124951956278bb585
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          coverage-artifact: coverage
          coverage-run-id: ${{ github.run_id }}

  merge-status:
    runs-on: ubuntu-latest
    needs: [pre-commit, static-checks, infra-tests, unit-tests, browser-tests]
    if: always()
    steps:
      - run: |
          failed=()
          [[ "${{ needs.pre-commit.result }}" != "success" ]] && failed+=("pre-commit")
          [[ "${{ needs.static-checks.result }}" != "success" ]] && failed+=("static-checks")
          [[ "${{ needs.infra-tests.result }}" != "success" ]] && failed+=("infra-tests")
          [[ "${{ needs.unit-tests.result }}" != "success" ]] && failed+=("unit-tests")
          [[ "${{ needs.browser-tests.result }}" != "success" ]] && failed+=("browser-tests")

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "The following jobs failed: ${failed[*]}"
            exit 1
          fi
